services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules  # ← ★この1行が非常に重要です！
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true  # ファイル変更を監視しやすくする設定
      - WATCHPACK_POLLING=true    # Next.js 13/14等で有効な設定
      - NEXT_PUBLIC_API_URL=http://localhost:8000
